[build]
publish = "dist"
command = "pnpm run build"

[build.environment]
NODE_VERSION = "22"
VITE_API_URL = "https://api.telegramtaxi.kz/api/v1"
VITE_WS_URL = "wss://ws.telegramtaxi.kz"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/manifest.webmanifest"

[headers.values]
Content-Type = "application/manifest+json"
